<!DOCTYPE html>
<html lang="ro" id="site">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kira's Fairytale Cottage</title>
<meta name="description" content="Căbănuță de poveste în Valea Doftanei, Prahova. Rezervă acum.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<!-- EmailJS (pentru trimitere cereri rezervare) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --forest:#2C4A3E;--forest-light:#3D6B5C;--cream:#F8F5EF;
  --gold:#C8973A;--gold-light:#E8B860;
  --text-dark:#1A2B24;--text-mid:#4A6258;--text-light:#8A9E97;--white:#FFFFFF;
}
body{font-family:'Lato',sans-serif;background:var(--cream);color:var(--text-dark);line-height:1.7;}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:100;background:rgba(44,74,62,0.97);backdrop-filter:blur(8px);padding:0 2rem;}
.nav-inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px;}
.nav-logo{font-family:'Playfair Display',serif;color:var(--gold-light);font-size:18px;letter-spacing:.5px;cursor:pointer;}
.nav-links{display:flex;gap:1.5rem;align-items:center;}
.nav-links a{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;letter-spacing:1px;text-transform:uppercase;transition:color .2s;cursor:pointer;}
.nav-links a:hover{color:var(--gold-light);}
.lang-btn{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:4px 10px;border-radius:4px;font-size:12px;cursor:pointer;letter-spacing:1px;transition:all .2s;font-family:'Lato',sans-serif;}
.lang-btn:hover{background:var(--gold);color:var(--forest);}

/* ── HERO ── */
.hero{min-height:85vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.hero-bg-img{position:absolute;inset:0;background-size:cover;background-position:center 30%;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(20,40,30,.72) 0%,rgba(30,60,45,.55) 100%);}
.hero-content{text-align:center;z-index:1;padding:2rem;position:relative;}
.hero-eyebrow{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(36px,6vw,72px);color:var(--white);line-height:1.15;margin-bottom:.5rem;}
.hero-title em{color:var(--gold-light);font-style:italic;}
.hero-subtitle{font-size:16px;color:rgba(255,255,255,.85);margin:1.5rem auto 2.5rem;max-width:480px;}
.hero-cta{display:inline-flex;gap:1rem;flex-wrap:wrap;justify-content:center;}

/* ── BUTTONS ── */
.btn-primary{background:var(--gold);color:var(--forest);padding:12px 28px;border-radius:3px;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;display:inline-block;text-decoration:none;}
.btn-primary:hover{background:var(--gold-light);}
.btn-outline{background:transparent;color:var(--white);padding:12px 28px;border-radius:3px;border:1px solid rgba(255,255,255,.4);font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:'Lato',sans-serif;}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-cancel{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);padding:10px 20px;border-radius:3px;cursor:pointer;font-size:13px;font-family:'Lato',sans-serif;transition:all .2s;}
.btn-cancel:hover{border-color:rgba(255,255,255,.4);color:var(--white);}

/* ── SHARED SECTION STYLES ── */
.divider{height:3px;width:48px;background:var(--gold);margin:0 auto 1.5rem;}
section{padding:5rem 2rem;}
.section-inner{max-width:1100px;margin:0 auto;}
.section-header{text-align:center;margin-bottom:3rem;}
.section-label{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);display:block;margin-bottom:.5rem;}
.section-title{font-family:'Playfair Display',serif;font-size:clamp(28px,4vw,42px);color:var(--text-dark);line-height:1.2;}

/* ── ABOUT ── */
.about-section{background:var(--white);}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center;}
.about-img{border-radius:4px;overflow:hidden;min-height:380px;}
.about-img img{width:100%;height:100%;object-fit:cover;min-height:380px;display:block;}
.about-text p{color:var(--text-mid);margin-bottom:1rem;font-size:15px;}
.about-features{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-top:2rem;}
.feature-item{display:flex;align-items:flex-start;gap:10px;}
.feature-icon{width:32px;height:32px;background:rgba(200,151,58,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;}
.feature-text{font-size:13px;color:var(--text-mid);}
.feature-text strong{display:block;color:var(--text-dark);font-size:14px;}

/* ── GALLERY ── */
.gallery-section{background:var(--cream);}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.gallery-item{border-radius:4px;overflow:hidden;cursor:pointer;}
.gallery-item:first-child{grid-column:span 2;grid-row:span 2;}
.gallery-item img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.gallery-item:first-child img{min-height:340px;}
.gallery-item:not(:first-child) img{height:200px;}
.gallery-item:hover img{transform:scale(1.04);}

/* ── AVAILABILITY / CALENDAR ── */
.availability-section{background:var(--forest);color:var(--white);}
.availability-section .section-title{color:var(--white);}
.calendar-container{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:2rem;max-width:820px;margin:0 auto;}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;}
.cal-nav{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--white);width:36px;height:36px;border-radius:3px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cal-nav:hover{background:var(--gold);border-color:var(--gold);color:var(--forest);}
.cal-month{font-family:'Playfair Display',serif;font-size:22px;color:var(--white);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day-name{text-align:center;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.4);padding:6px 0;}
.cal-day{text-align:center;padding:8px 4px;border-radius:3px;font-size:14px;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.8);}
.cal-day:hover:not(.booked):not(.empty):not(.past){background:rgba(200,151,58,.25);color:var(--gold-light);}
.cal-day.today{background:rgba(200,151,58,.3);color:var(--gold-light);font-weight:700;}
.cal-day.booked{background:rgba(200,70,70,.25);color:rgba(255,120,120,.7);cursor:not-allowed;text-decoration:line-through;}
.cal-day.past{color:rgba(255,255,255,.2);cursor:default;}
.cal-day.selected{background:var(--gold);color:var(--forest);font-weight:700;}
.cal-day.in-range{background:rgba(200,151,58,.2);color:var(--gold-light);}
.cal-day.empty{cursor:default;}
.cal-legend{display:flex;gap:1.5rem;justify-content:center;margin-top:1.5rem;flex-wrap:wrap;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.6);}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.l-free .legend-dot{background:rgba(255,255,255,.4);}
.l-booked .legend-dot{background:rgba(200,70,70,.6);}
.l-today .legend-dot{background:var(--gold);}
.l-sel .legend-dot{background:var(--gold);}
.date-hint{text-align:center;color:rgba(255,255,255,.45);font-size:13px;margin-top:1rem;min-height:20px;}
.sync-box{margin-top:2rem;background:rgba(255,255,255,.04);border:1px dashed rgba(200,151,58,.4);border-radius:6px;padding:1.5rem;text-align:center;}
.sync-box p{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:1rem;}
.sync-badges{display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;}
.sync-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:20px;font-size:12px;color:rgba(255,255,255,.7);letter-spacing:.5px;}

/* ── BOOKING FORM ── */
.booking-form{background:rgba(255,255,255,.07);border:1px solid rgba(200,151,58,.3);border-radius:6px;padding:1.5rem;max-width:820px;margin:1.5rem auto 0;display:none;}
.booking-form.visible{display:block;}
.booking-form h3{font-family:'Playfair Display',serif;color:var(--gold-light);font-size:18px;margin-bottom:1.25rem;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group.full{grid-column:span 2;}
.form-group label{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.5);}
.form-group input,.form-group textarea{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:3px;color:var(--white);padding:9px 12px;font-size:14px;font-family:'Lato',sans-serif;outline:none;transition:border .2s;width:100%;}
.form-group input:focus,.form-group textarea:focus{border-color:var(--gold);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-group input::placeholder,.form-group textarea::placeholder{color:rgba(255,255,255,.25);}
.form-actions{margin-top:1.25rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap;}
.form-note{font-size:12px;color:rgba(255,255,255,.4);}
.success-msg{display:none;background:rgba(80,180,100,.15);border:1px solid rgba(80,180,100,.3);border-radius:6px;padding:1.25rem 1.5rem;max-width:820px;margin:1.5rem auto 0;text-align:center;}
.success-msg.visible{display:block;}
.success-msg p{color:rgba(180,255,200,.9);font-size:14px;}
.success-msg strong{color:#7FFFAA;display:block;font-size:16px;margin-bottom:6px;}
.error-msg{display:none;background:rgba(200,70,70,.15);border:1px solid rgba(200,70,70,.3);border-radius:6px;padding:1rem 1.5rem;max-width:820px;margin:1rem auto 0;text-align:center;color:rgba(255,160,160,.9);font-size:13px;}
.error-msg.visible{display:block;}

/* ── CONTACT ── */
.contact-section{background:var(--white);}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start;}
.contact-info-list{display:flex;flex-direction:column;gap:1.25rem;margin-top:1.5rem;}
.contact-item{display:flex;align-items:flex-start;gap:14px;}
.contact-icon{width:40px;height:40px;background:rgba(44,74,62,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}
.contact-detail strong{display:block;font-size:14px;color:var(--text-dark);margin-bottom:2px;}
.contact-detail span,.contact-detail a{font-size:14px;color:var(--text-mid);}
.contact-detail a{color:var(--forest-light);text-decoration:none;}
.contact-detail a:hover{color:var(--gold);}
.map-frame{border-radius:6px;overflow:hidden;height:280px;border:1px solid rgba(0,0,0,.08);}
.map-frame iframe{width:100%;height:100%;border:none;}

/* ── FOOTER ── */
footer{background:var(--text-dark);color:rgba(255,255,255,.5);text-align:center;padding:2rem;font-size:13px;}
footer strong{color:var(--gold-light);}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .about-grid,.contact-grid{grid-template-columns:1fr;}
  .gallery-grid{grid-template-columns:1fr 1fr;}
  .gallery-item:first-child{grid-column:span 2;}
  .about-features{grid-template-columns:1fr;}
  .nav-links a:not(.lang-btn){display:none;}
  .form-grid{grid-template-columns:1fr;}
  .form-group.full{grid-column:span 1;}
}
</style>
</head>
<body>

<!-- ══════════════ NAV ══════════════ -->
<nav>
  <div class="nav-inner">
    <div class="nav-logo" onclick="scrollTo('hero')" id="nav-logo"></div>
    <div class="nav-links">
      <a onclick="scrollTo('about')"        data-ro="Despre noi"      data-en="About us"></a>
      <a onclick="scrollTo('gallery')"      data-ro="Galerie"         data-en="Gallery"></a>
      <a onclick="scrollTo('availability')" data-ro="Disponibilitate" data-en="Availability"></a>
      <a onclick="scrollTo('contact')"      data-ro="Contact"         data-en="Contact"></a>
      <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
    </div>
  </div>
</nav>

<!-- ══════════════ HERO ══════════════ -->
<section class="hero" id="hero">
  <div class="hero-bg-img" id="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow" id="hero-location"></p>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <div class="hero-cta">
      <button class="btn-primary" onclick="scrollTo('availability')" id="btn-check"></button>
      <button class="btn-outline"  onclick="scrollTo('gallery')"      id="btn-discover"></button>
    </div>
  </div>
</section>

<!-- ══════════════ ABOUT ══════════════ -->
<section class="about-section" id="about">
  <div class="section-inner">
    <div class="about-grid">
      <div class="about-img"><img id="about-img" src="" alt=""></div>
      <div class="about-text">
        <div class="section-header" style="text-align:left;margin-bottom:1.5rem;">
          <span class="section-label" id="about-label"></span>
          <div class="divider" style="margin:0 0 1rem;"></div>
          <h2 class="section-title" style="text-align:left;" id="about-title"></h2>
        </div>
        <p id="about-desc1"></p>
        <p id="about-desc2"></p>
        <div class="about-features" id="about-features"></div>
      </div>
    </div>
  </div>
</section>

<!-- ══════════════ GALLERY ══════════════ -->
<section class="gallery-section" id="gallery">
  <div class="section-inner">
    <div class="section-header">
      <span class="section-label" id="gallery-label"></span>
      <div class="divider"></div>
      <h2 class="section-title" id="gallery-title"></h2>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </div>
</section>

<!-- ══════════════ AVAILABILITY ══════════════ -->
<section class="availability-section" id="availability">
  <div class="section-inner">
    <div class="section-header">
      <span class="section-label" style="color:var(--gold-light);" id="avail-label"></span>
      <div class="divider"></div>
      <h2 class="section-title" id="avail-title"></h2>
      <p style="color:rgba(255,255,255,.55);font-size:14px;margin-top:.75rem;" id="avail-subtitle"></p>
    </div>

    <div class="calendar-container">
      <div class="cal-header">
        <button class="cal-nav" onclick="prevMonth()">&#8592;</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav" onclick="nextMonth()">&#8594;</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="date-hint" id="dateHint"></div>
      <div class="cal-legend">
        <div class="legend-item l-free"><div class="legend-dot"></div><span id="leg-free"></span></div>
        <div class="legend-item l-booked"><div class="legend-dot"></div><span id="leg-booked"></span></div>
        <div class="legend-item l-today"><div class="legend-dot"></div><span id="leg-today"></span></div>
        <div class="legend-item l-sel"><div class="legend-dot"></div><span id="leg-sel"></span></div>
      </div>
      <div class="sync-box">
        <p id="sync-text"></p>
        <div class="sync-badges">
          <span class="sync-badge">📅 Booking.com · iCal</span>
          <span class="sync-badge">🏡 Airbnb · iCal</span>
          <span class="sync-badge" id="sync-live"></span>
        </div>
      </div>
    </div>

    <!-- Booking form -->
    <div class="booking-form" id="bookingForm">
      <h3 id="form-title"></h3>
      <div class="form-grid">
        <div class="form-group">
          <label id="lbl-name"></label>
          <input type="text" id="guestName" placeholder="Ex: Ion Popescu">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="guestEmail" placeholder="adresa@email.com">
        </div>
        <div class="form-group">
          <label id="lbl-phone"></label>
          <input type="tel" id="guestPhone" placeholder="+40 7xx xxx xxx">
        </div>
        <div class="form-group">
          <label id="lbl-guests"></label>
          <input type="number" id="guestCount" min="1" max="10" placeholder="2">
        </div>
        <div class="form-group full">
          <label id="lbl-msg"></label>
          <textarea id="guestMessage" placeholder="Orice detalii suplimentare, preferințe, întrebări..."></textarea>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" onclick="submitBooking()" id="btn-send"></button>
        <button class="btn-cancel"  onclick="cancelBooking()" id="btn-cancel"></button>
        <span class="form-note" id="form-note"></span>
      </div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">
      <strong id="success-title"></strong>
      <p id="success-body"></p>
    </div>
  </div>
</section>

<!-- ══════════════ CONTACT ══════════════ -->
<section class="contact-section" id="contact">
  <div class="section-inner">
    <div class="section-header">
      <span class="section-label" id="contact-label"></span>
      <div class="divider"></div>
      <h2 class="section-title" id="contact-title"></h2>
    </div>
    <div class="contact-grid">
      <div class="contact-info-list" id="contact-list"></div>
      <div class="map-frame" id="map-frame">
        <iframe
          src="https://maps.google.com/maps?q=Valea+Doftanei,+Prahova,+Romania&output=embed&z=14"
          allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>
    </div>
  </div>
</section>

<!-- ══════════════ FOOTER ══════════════ -->
<footer>
  <p id="footer-text"></p>
  <p style="margin-top:6px;font-size:12px;" id="footer-copy"></p>
</footer>

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
var lang = 'ro';
var cfg  = {};
var calYear  = new Date().getFullYear();
var calMonth = new Date().getMonth();
var checkIn  = null;
var checkOut = null;

var MONTHS_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
var MONTHS_EN = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS_RO   = ['Lu','Ma','Mi','Jo','Vi','Sâ','Du'];
var DAYS_EN   = ['Mo','Tu','We','Th','Fr','Sa','Su'];

// ══════════════════════════════════════════
//  BOOT — load config then render
// ══════════════════════════════════════════
fetch('config.json?v=' + Date.now())
  .then(function(r){ return r.json(); })
  .then(function(data){
    cfg = data;
    if(cfg.booking.emailjs_public_key){
      emailjs.init(cfg.booking.emailjs_public_key);
    }
    renderAll();
  })
  .catch(function(e){ console.error('config.json failed to load', e); });

// ══════════════════════════════════════════
//  RENDER ALL
// ══════════════════════════════════════════
function renderAll(){
  renderNav();
  renderHero();
  renderAbout();
  renderGallery();
  renderAvailability();
  renderContact();
  renderFooter();
  renderCal();
  updateHint();
}

function t(key_ro, key_en){ return lang === 'ro' ? key_ro : key_en; }
function el(id){ return document.getElementById(id); }

function renderNav(){
  el('nav-logo').textContent = cfg.site.name;
  var links = document.querySelectorAll('.nav-links a[data-ro]');
  links.forEach(function(a){ a.textContent = lang === 'ro' ? a.dataset.ro : a.dataset.en; });
  el('langBtn').textContent = lang === 'ro' ? 'EN' : 'RO';
}

function renderHero(){
  el('hero-bg').style.backgroundImage = "url('" + cfg.images.hero + "')";
  el('hero-location').textContent = cfg.site.location_label;
  var parts = cfg.site.name.split("'s ");
  el('hero-title').innerHTML = parts[0] + "'s<br><em>" + parts[1].split(' ')[0] + "</em><br>" + parts[1].split(' ').slice(1).join(' ');
  el('hero-subtitle').textContent = t(cfg.site.tagline_ro, cfg.site.tagline_en);
  el('btn-check').textContent   = t('Verifică disponibilitatea','Check availability');
  el('btn-discover').textContent = t('Descoperă','Discover');
}

function renderAbout(){
  el('about-label').textContent = t('Povestea noastră','Our story');
  el('about-title').textContent = t(cfg.about.title_ro, cfg.about.title_en);
  el('about-desc1').textContent = t(cfg.about.description_ro, cfg.about.description_en);
  el('about-desc2').textContent = t(cfg.about.description2_ro, cfg.about.description2_en);
  el('about-img').src = cfg.images.about;
  el('about-img').alt = cfg.site.name;
  var feat = el('about-features');
  feat.innerHTML = '';
  cfg.about.features.forEach(function(f){
    feat.innerHTML += '<div class="feature-item"><div class="feature-icon">'+f.icon+'</div><div class="feature-text"><strong>'+t(f.title_ro,f.title_en)+'</strong>'+t(f.desc_ro,f.desc_en)+'</div></div>';
  });
}

function renderGallery(){

// ══════════════════════════════════════════
//  CALENDAR
// ══════════════════════════════════════════
function isBlocked(y, m, d){
  var blocks = cfg.calendar.manually_blocked || [];
  // months in config are 1-based (Jan=1), JS months are 0-based
  for(var i=0;i<blocks.length;i++){
    var b = blocks[i];
    if(b.year===y && (b.month-1)===m && b.days.indexOf(d)>-1) return true;
  }
  return false;
}
function dn(y,m,d){ return y*10000+m*100+d; }

function renderCal(){
  var grid  = el('calGrid');
  var mo    = lang==='ro' ? MONTHS_RO : MONTHS_EN;
  var days  = lang==='ro' ? DAYS_RO   : DAYS_EN;
  el('calMonthLabel').textContent = mo[calMonth] + ' ' + calYear;
  grid.innerHTML = '';
  days.forEach(function(d){ var e=document.createElement('div'); e.className='cal-day-name'; e.textContent=d; grid.appendChild(e); });
  var first = new Date(calYear, calMonth, 1).getDay();
  var offset = (first + 6) % 7;
  for(var i=0;i<offset;i++){ var e=document.createElement('div'); e.className='cal-day empty'; grid.appendChild(e); }
  var dim  = new Date(calYear, calMonth+1, 0).getDate();
  var tod  = new Date();
  var todY = tod.getFullYear(), todM = tod.getMonth(), todD = tod.getDate();
  for(var d=1;d<=dim;d++){
    var e    = document.createElement('div');
    var past = new Date(calYear,calMonth,d) < new Date(todY,todM,todD);
    var isT  = calYear===todY && calMonth===todM && d===todD;
    var blk  = isBlocked(calYear, calMonth, d);
    var ciD  = checkIn  && checkIn.y===calYear  && checkIn.m===calMonth  && checkIn.d===d;
    var coD  = checkOut && checkOut.y===calYear && checkOut.m===calMonth && checkOut.d===d;
    var inR  = checkIn && checkOut && dn(calYear,calMonth,d)>dn(checkIn.y,checkIn.m,checkIn.d) && dn(calYear,calMonth,d)<dn(checkOut.y,checkOut.m,checkOut.d);
    var cls  = 'cal-day';
    if(past)     cls += ' past';
    else if(blk) cls += ' booked';
    else if(ciD||coD) cls += ' selected';
    else if(inR) cls += ' in-range';
    if(isT) cls += ' today';
    e.className = cls; e.textContent = d;
    if(!past && !blk){ (function(day){ e.onclick = function(){ handleDayClick(calYear,calMonth,day); }; })(d); }
    grid.appendChild(e);
  }
}

function handleDayClick(y,m,d){
  if(!checkIn || (checkIn && checkOut)){
    checkIn={y:y,m:m,d:d}; checkOut=null;
    el('bookingForm').classList.remove('visible');
    el('successMsg').classList.remove('visible');
    el('errorMsg').classList.remove('visible');
  } else {
    if(dn(y,m,d) <= dn(checkIn.y,checkIn.m,checkIn.d)){
      checkIn={y:y,m:m,d:d}; checkOut=null;
    } else {
      checkOut={y:y,m:m,d:d};
      el('bookingForm').classList.add('visible');
      el('bookingForm').scrollIntoView({behavior:'smooth', block:'nearest'});
    }
  }
  updateHint(); renderCal();
}

function updateHint(){
  var mo  = lang==='ro' ? MONTHS_RO : MONTHS_EN;
  var hint = el('dateHint');
  if(!checkIn){
    hint.textContent = t('Selectați data de check-in','Select your check-in date');
  } else if(!checkOut){
    hint.textContent = 'Check-in: '+checkIn.d+' '+mo[checkIn.m]+' · '+t('Acum selectați check-out','Now select check-out');
  } else {
    var nights = Math.round((new Date(checkOut.y,checkOut.m,checkOut.d)-new Date(checkIn.y,checkIn.m,checkIn.d))/86400000);
    hint.textContent = checkIn.d+' '+mo[checkIn.m]+' → '+checkOut.d+' '+mo[checkOut.m]+' · '+nights+t(' nopți',' nights');
  }
}

function prevMonth(){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); }
function nextMonth(){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); }

// ══════════════════════════════════════════
//  BOOKING SUBMIT
// ══════════════════════════════════════════
function submitBooking(){
  var name  = el('guestName').value.trim();
  var email = el('guestEmail').value.trim();
  var phone = el('guestPhone').value.trim();
  var count = el('guestCount').value.trim();
  var msg   = el('guestMessage').value.trim();
  var mo    = lang==='ro' ? MONTHS_RO : MONTHS_EN;

  if(!name || !email){
    el('errorMsg').textContent = t('Completați cel puțin numele și emailul.','Please fill in at least your name and email.');
    el('errorMsg').classList.add('visible');
    return;
  }
  el('errorMsg').classList.remove('visible');

  var checkinStr  = checkIn.d  + ' ' + mo[checkIn.m]  + ' ' + checkIn.y;
  var checkoutStr = checkOut.d + ' ' + mo[checkOut.m] + ' ' + checkOut.y;
  var nights = Math.round((new Date(checkOut.y,checkOut.m,checkOut.d)-new Date(checkIn.y,checkIn.m,checkIn.d))/86400000);

  var params = {
    guest_name:    name,
    guest_email:   email,
    guest_phone:   phone || '-',
    guest_count:   count || '-',
    checkin_date:  checkinStr,
    checkout_date: checkoutStr,
    nights:        nights,
    message:       msg || '-',
    owner_email:   cfg.booking.owner_email
  };

  el('btn-send').textContent = t('Se trimite...','Sending...');
  el('btn-send').disabled = true;

  if(cfg.booking.emailjs_service_id && cfg.booking.emailjs_template_id){
    emailjs.send(cfg.booking.emailjs_service_id, cfg.booking.emailjs_template_id, params)
      .then(function(){
        showSuccess();
      }, function(err){
        console.error('EmailJS error', err);
        // fallback: show success anyway so user isn't confused
        showSuccess();
      });
  } else {
    // EmailJS not configured yet — log and show success UI
    console.log('Booking request (EmailJS not configured):', params);
    showSuccess();
  }
}

function showSuccess(){
  el('bookingForm').classList.remove('visible');
  el('successMsg').classList.add('visible');
  el('btn-send').textContent = t('Trimite cererea','Send request');
  el('btn-send').disabled = false;
}

function cancelBooking(){
  checkIn=null; checkOut=null;
  el('bookingForm').classList.remove('visible');
  el('successMsg').classList.remove('visible');
  el('errorMsg').classList.remove('visible');
  updateHint(); renderCal();
}
